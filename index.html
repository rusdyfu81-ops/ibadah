<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GPBSI — Koordinasi Liturgis</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1B2B5E;--navy2:#243672;--gold:#C9A84C;--gold2:#E8C96A;
  --cream:#F5F0E8;--cream2:#EDE6D6;
  --red:#DC2626;--red-l:#FEE2E2;--green:#16A34A;--green-l:#DCFCE7;
  --amber:#D97706;--amber-l:#FEF3C7;--blue:#2563EB;--blue-l:#DBEAFE;
  --ink:#1a1a2e;--ink2:#374151;--ink3:#6B7280;--ink4:#9CA3AF;
  --border:#D4C9B0;--font:'Plus Jakarta Sans',-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:var(--font);background:var(--cream);color:var(--ink)}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* LOGIN */
#scrLogin{background:rgba(13,27,62,.95);align-items:center;justify-content:center;padding:40px 24px;gap:28px;position:fixed;inset:0;z-index:500;backdrop-filter:blur(4px)}
.login-cross{width:56px;height:56px;position:relative;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.login-cross::before{content:'';position:absolute;width:9px;height:56px;background:var(--gold);border-radius:5px}
.login-cross::after{content:'';position:absolute;width:42px;height:9px;background:var(--gold);border-radius:5px;top:10px}
.login-logo{text-align:center}
.login-logo h1{font-size:24px;font-weight:800;color:#fff}
.login-logo p{font-size:12px;color:rgba(255,255,255,.45);margin-top:4px;line-height:1.5}
.login-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:24px;width:100%;max-width:360px}
.f-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.f-inp{width:100%;padding:13px;border-radius:9px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:15px;font-family:var(--font);margin-bottom:12px}
.f-inp:focus{outline:none;border-color:var(--gold)}
.btn-login{width:100%;padding:15px;background:var(--gold);color:var(--navy);font-size:15px;font-weight:700;border:none;border-radius:9px;cursor:pointer;font-family:var(--font)}
.login-err{font-size:12px;color:#fca5a5;text-align:center;margin-top:10px;min-height:18px}

/* TOPBAR */
.topbar{background:var(--navy);padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:56px;flex-shrink:0;position:sticky;top:0;z-index:100}
.tb-brand{display:flex;align-items:center;gap:8px}
.tb-cross{font-size:18px;color:var(--gold)}
.tb-title{font-size:14px;font-weight:800;color:#fff}
.tb-sub{font-size:10px;color:rgba(255,255,255,.4)}
.tb-right{display:flex;align-items:center;gap:8px}
.role-pill{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px}
.rp-admin{background:rgba(255,255,255,.15);color:#fff}
.rp-ibadah{background:rgba(201,168,76,.25);color:var(--gold2)}
.rp-pujian{background:rgba(220,38,38,.2);color:#fca5a5}
.rp-koor{background:rgba(39,174,96,.2);color:#6fcf97}
.rp-usher{background:rgba(86,204,242,.2);color:#56ccf2}
.rp-user{background:rgba(255,255,255,.08);color:rgba(255,255,255,.4)}
.tb-btn{background:none;border:none;cursor:pointer;padding:8px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-family:var(--font)}
.tb-login-btn{color:var(--gold);font-size:13px;font-weight:700;border:1px solid var(--gold);border-radius:20px;padding:6px 12px;min-width:unset}
.tb-logout-btn{color:rgba(255,255,255,.4);font-size:18px}
.gold-line{height:3px;background:linear-gradient(90deg,var(--navy),var(--gold),var(--navy));flex-shrink:0}

/* STATUS BAR */
.status-bar{background:var(--amber-l);border-bottom:2px solid var(--amber);padding:0;overflow:hidden;flex-shrink:0;max-height:0;transition:max-height .3s}
.status-bar.show{max-height:120px}
.status-bar-inner{padding:8px 14px;display:flex;flex-direction:column;gap:4px}
.status-item{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#92400E}
.s-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);flex-shrink:0;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* SESSION BAR */
.sess-bar{background:var(--navy2);padding:8px 12px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.sess-bar::-webkit-scrollbar{display:none}
.sess-btn{flex-shrink:0;padding:8px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.5);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);white-space:nowrap;min-height:44px;display:flex;align-items:center}
.sess-btn.on{background:var(--gold);color:var(--navy);border-color:var(--gold);font-size:13px}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;padding-bottom:80px}

/* BOTTOM NAV */
.bnav{background:var(--navy);border-top:1px solid rgba(201,168,76,.2);display:flex;position:fixed;bottom:0;left:0;right:0;z-index:100}
.bnav-btn{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;color:rgba(255,255,255,.35);font-size:11px;font-weight:600;font-family:var(--font);min-height:56px;position:relative}
.bnav-btn svg{width:22px;height:22px}
.bnav-btn.on{color:var(--gold)}
.bnav-btn.on::after{content:'';position:absolute;bottom:0;left:15%;width:70%;height:2px;background:var(--gold);border-radius:2px 2px 0 0}

/* CARDS */
.card{background:#fff;border-radius:12px;padding:14px;border:1px solid var(--border)}
.card-ttl{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:10px}

/* PROGRESS */
.progress-wrap{background:#fff;border-radius:12px;border:1px solid var(--border);padding:12px 14px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.progress-label span:first-child{font-weight:600}
.progress-label span:last-child{color:var(--ink3)}
.progress-bar-bg{height:6px;background:var(--cream2);border-radius:10px;overflow:hidden}
.progress-bar{height:100%;background:var(--green);border-radius:10px;transition:width .3s}
.progress-bar.warn{background:var(--amber)}
.progress-bar.danger{background:var(--red)}

/* RUNDOWN */
.rd-wrap{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden}
.rd-item{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid var(--cream2);cursor:pointer;transition:background .1s;min-height:64px;position:relative;overflow:hidden}
.rd-item:last-child{border-bottom:none}
.rd-item:active{background:var(--cream)}
.rd-item.expanded{background:#FAFAF8}
.rd-n{width:28px;height:28px;border-radius:50%;background:var(--cream2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ink3);flex-shrink:0;border:1px solid var(--border)}
.rd-body{flex:1;min-width:0}
.rd-name{font-size:14px;font-weight:700;color:var(--ink)}
.rd-sub{font-size:13px;color:var(--navy);font-weight:600;margin-top:3px}
.rd-sub.empty{color:var(--red);font-weight:500;font-size:12px}
.rd-sub.muted{color:var(--ink4);font-weight:400;font-size:12px}
.rd-upd-badge{font-size:10px;color:var(--amber);font-weight:600;margin-top:2px}
.dot-empty{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0}
.dot-ok{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.chip-new{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--blue-l);color:var(--blue);font-weight:700;flex-shrink:0}
.ripple{position:absolute;border-radius:50%;background:rgba(201,168,76,.25);transform:scale(0);animation:ripple .4s linear;pointer-events:none}
@keyframes ripple{to{transform:scale(4);opacity:0}}

/* DETAIL PANEL */
.rd-detail{padding:10px 14px 12px 54px;background:#F7F5F0;border-top:1px solid var(--cream2);display:none}
.rd-detail.show{display:block}
.rd-detail-hdr{font-size:10px;font-weight:700;color:var(--ink4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.rd-drow{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:5px 0;border-bottom:1px solid var(--cream2);font-size:13px;line-height:1.4}
.rd-drow:last-child{border-bottom:none}
.rd-dl{color:var(--ink3);flex-shrink:0;min-width:80px}
.rd-dv{font-weight:600;color:var(--ink);text-align:right}
.rd-dv.empty{color:var(--ink4);font-weight:400;font-style:italic}
.rd-upd{font-size:10px;color:var(--ink4);font-style:italic;margin-top:6px}

/* EDIT FORM */
.edit-section{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:8px}
.edit-section-hd{padding:14px;border-bottom:1px solid var(--cream2);display:flex;align-items:center;justify-content:space-between;cursor:pointer;min-height:52px}
.edit-section-ttl{font-size:13px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:7px}
.edit-section-body{padding:14px;display:none}
.edit-section-body.open{display:block}
.e-group{margin-bottom:14px}
.e-lbl{font-size:12px;font-weight:600;color:var(--ink3);margin-bottom:6px;display:block}
.e-inp,.e-sel,.e-ta{width:100%;padding:13px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--font);color:var(--ink);background:#fff;transition:border-color .15s;-webkit-appearance:none}
.e-inp:focus,.e-sel:focus,.e-ta:focus{outline:none;border-color:var(--gold)}
.e-ta{resize:vertical;min-height:72px;line-height:1.5}
.e-row{display:flex;gap:8px}
.e-row>*{flex:1}
.btn-save{width:100%;padding:15px;background:var(--navy);color:#fff;font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px;min-height:52px}
.btn-save:active{opacity:.85}
.btn-add-sm{width:100%;padding:13px;background:transparent;color:var(--navy);border:1.5px dashed var(--border);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px;min-height:48px;margin-top:6px}
.btn-danger{background:var(--red);border-color:var(--red)}
.save-hint{font-size:11px;color:var(--ink4);text-align:center;margin-top:8px}

/* ITEM CARDS */
.item-card{background:var(--cream);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border)}
.item-card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.item-card-ttl{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.05em}
.item-card-meta{font-size:10px;color:var(--ink4);font-style:italic}
.btn-remove{background:none;border:none;color:var(--red);font-size:20px;cursor:pointer;padding:2px;line-height:1;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center}

/* RUNDOWN EDIT */
.rd-edit-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--cream);border-radius:8px;margin-bottom:6px;border:1px solid var(--border);min-height:52px}
.rd-edit-drag{color:var(--ink4);font-size:18px;cursor:grab;padding:4px;flex-shrink:0}
.rd-edit-body{flex:1;min-width:0}
.rd-edit-judul{font-size:13px;font-weight:600}
.rd-edit-petugas{font-size:11px;color:var(--ink3)}

/* ADMIN */
.user-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--cream2);min-height:56px}
.user-item:last-child{border-bottom:none}
.u-av{width:36px;height:36px;border-radius:50%;background:var(--navy);color:var(--gold2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.u-name{font-size:14px;font-weight:700}
.u-email{font-size:12px;color:var(--ink3)}
.u-role{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;flex-shrink:0}
.ur-admin{background:var(--amber-l);color:var(--amber)}
.ur-ibadah{background:var(--blue-l);color:var(--blue)}
.ur-pujian{background:var(--red-l);color:var(--red)}
.ur-koor{background:var(--green-l);color:var(--green)}
.ur-usher{background:#E0F2FE;color:#0369a1}
.ur-user{background:var(--cream2);color:var(--ink3)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(13,27,62,.9);z-index:600;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.modal-sheet{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-ttl{font-size:15px;font-weight:700;color:var(--navy)}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--ink3);padding:4px;line-height:1;min-width:36px;min-height:36px}

/* EMPTY */
.empty-state{text-align:center;padding:48px 24px;color:var(--ink3)}
.empty-state .es-icon{font-size:40px;margin-bottom:12px}
.empty-state .es-title{font-size:15px;font-weight:700;color:var(--ink2);margin-bottom:6px}
.empty-state .es-desc{font-size:13px;line-height:1.5}

/* LOADING & TOAST */
#loading{position:fixed;inset:0;background:rgba(27,43,94,.88);display:none;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
#loading.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid rgba(201,168,76,.3);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:#fff;font-size:13px;font-weight:600}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:20px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:200;white-space:nowrap;border:1px solid var(--gold);max-width:90vw;text-align:center}
#toast.show{opacity:1}
#toast.ok{background:var(--green);border-color:var(--green)}
#toast.err{background:var(--red);border-color:var(--red)}
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div class="screen" id="scrLogin" onclick="closeLoginIfOutside(event)">
  <div class="login-logo">
    <div class="login-cross"></div>
    <h1>GPBSI</h1>
    <p>Gereja Presbiterian Bukit Sion Indonesia<br>Koordinasi Liturgis</p>
  </div>
  <div class="login-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <div style="font-size:14px;font-weight:700;color:#fff">Masuk sebagai Pelayan</div>
      <button onclick="document.getElementById('scrLogin').classList.remove('active')" style="background:none;border:none;color:rgba(255,255,255,.5);font-size:24px;cursor:pointer;padding:4px;line-height:1">×</button>
    </div>
    <div class="f-lbl">Email</div>
    <input class="f-inp" type="email" id="loginEmail" placeholder="email@gpbsi.org" autocomplete="email"/>
    <div class="f-lbl">Password</div>
    <input class="f-inp" type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"/>
    <button class="btn-login" onclick="doLogin()">Masuk</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- MAIN APP -->
<div class="screen active" id="scrApp">
  <div class="topbar">
    <div class="tb-brand">
      <span class="tb-cross">✝</span>
      <div>
        <div class="tb-title">GPBSI Liturgis</div>
        <div class="tb-sub" id="tbSub">Koordinasi Ibadah</div>
      </div>
    </div>
    <div class="tb-right">
      <span class="role-pill" id="rolePill"></span>
      <button class="tb-btn tb-login-btn" id="tbLoginBtn" onclick="showLogin()" style="display:none">Masuk</button>
      <button class="tb-btn tb-logout-btn" id="tbLogoutBtn" onclick="doLogout()" style="display:none">⏻</button>
    </div>
  </div>
  <div class="gold-line"></div>
  <div class="status-bar" id="statusBar"><div class="status-bar-inner" id="statusBarInner"></div></div>
  <div class="sess-bar" id="sessBar"></div>
  <div class="content" id="mainContent"></div>
  <nav class="bnav" id="bnav"></nav>
</div>

<div id="loading"><div class="spinner"></div><p id="loadTxt">Memuat...</p></div>
<div id="toast"></div>

<script>
const SB='https://ucbxyuvtcaszsldzajfc.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjYnh5dXZ0Y2FzenNsZHphamZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDIxNjUsImV4cCI6MjA5NDg3ODE2NX0.1pcuC2rc95yJrtMlyoGHO4A0r3Zih9UkOHxbVn5IJt0';

let USER=null,SESI=[],CURR=null,TAB='rundown';
let PENGKHOTBAH=[],PELAYAN=[],expandedIdx=-1;
let CURR_RD=[],CURR_LAGU=[],CURR_WARTA=[],CURR_JB=[];

const H=()=>({'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+(USER?.token||KEY)});
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtTime=iso=>{if(!iso)return'';const d=new Date(iso),now=new Date(),diff=Math.floor((now-d)/60000);if(diff<1)return'baru saja';if(diff<60)return diff+' mnt lalu';if(diff<1440)return Math.floor(diff/60)+' jam lalu';return d.toLocaleDateString('id-ID',{day:'numeric',month:'short'});};
const initials=n=>(n||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
const api=(path,opt={})=>fetch(SB+path,{...opt,headers:{...H(),...(opt.headers||{})}}).then(r=>r.json());

let toastT;
function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className='show '+type;clearTimeout(toastT);toastT=setTimeout(()=>el.className='',3000);}
function loading(on,txt='Memuat...'){document.getElementById('loading').classList.toggle('show',on);document.getElementById('loadTxt').textContent=txt;}

// ── AUTH ──
function showLogin(){document.getElementById('scrLogin').classList.add('active');setTimeout(()=>document.getElementById('loginEmail').focus(),100);}
function closeLoginIfOutside(e){if(e.target===document.getElementById('scrLogin'))document.getElementById('scrLogin').classList.remove('active');}

async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  const err=document.getElementById('loginErr');
  err.textContent='';
  if(!email||!pass){err.textContent='Email dan password harus diisi';return;}
  loading(true,'Masuk...');
  try{
    const res=await fetch(`${SB}/auth/v1/token?grant_type=password`,{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY},body:JSON.stringify({email,password:pass})});
    const auth=await res.json();
    if(!res.ok)throw new Error(auth.error_description||auth.message||'Login gagal');
    const profiles=await fetch(`${SB}/rest/v1/liturgis_users?email=eq.${encodeURIComponent(email)}&select=*`,{headers:{'apikey':KEY,'Authorization':'Bearer '+auth.access_token}}).then(r=>r.json());
    if(!profiles.length)throw new Error('Akun tidak ditemukan di daftar pengguna');
    const p=profiles[0];
    USER={id:auth.user.id,email,nama:p.nama,role:p.role,token:auth.access_token};
    localStorage.setItem('gpbsi_lit',JSON.stringify({...USER,exp:Date.now()+3600000*8}));
    document.getElementById('scrLogin').classList.remove('active');
    applyUserUI();
    buildNav();
    await renderTab();
  }catch(e){err.textContent=e.message;}finally{loading(false);}
}

async function restoreSession(){
  const s=localStorage.getItem('gpbsi_lit');
  if(!s)return false;
  const d=JSON.parse(s);
  if(Date.now()>d.exp){localStorage.removeItem('gpbsi_lit');return false;}
  USER=d;return true;
}

function doLogout(){
  localStorage.removeItem('gpbsi_lit');USER=null;
  document.getElementById('rolePill').textContent='Tamu';
  document.getElementById('rolePill').className='role-pill rp-user';
  document.getElementById('tbSub').textContent='Mode Lihat';
  document.getElementById('tbLoginBtn').style.display='flex';
  document.getElementById('tbLogoutBtn').style.display='none';
  buildNav();renderTab();
}

function applyUserUI(){
  const rmap={admin:'rp-admin',ibadah:'rp-ibadah',pujian:'rp-pujian',koor:'rp-koor',usher:'rp-usher',user:'rp-user'};
  const pill=document.getElementById('rolePill');
  pill.textContent=USER.role.charAt(0).toUpperCase()+USER.role.slice(1);
  pill.className='role-pill '+(rmap[USER.role]||'rp-user');
  document.getElementById('tbSub').textContent=USER.nama;
  document.getElementById('tbLoginBtn').style.display='none';
  document.getElementById('tbLogoutBtn').style.display='flex';
}

// ── INIT ──
async function init(){
  await Promise.all([loadMaster(),loadSesi()]);
  if(await restoreSession()){applyUserUI();}
  else{
    document.getElementById('tbLoginBtn').style.display='flex';
    document.getElementById('rolePill').textContent='Tamu';
    document.getElementById('rolePill').className='role-pill rp-user';
    document.getElementById('tbSub').textContent='Mode Lihat';
  }
  buildNav();
  if(CURR){await loadCurrData();await renderTab();}
  else{document.getElementById('mainContent').innerHTML=buildEmpty();}
}

async function loadMaster(){
  const[pk,pl]=await Promise.all([
    api('/rest/v1/liturgis_pengkhotbah?aktif=eq.true&order=urutan.asc').catch(()=>[]),
    api('/rest/v1/liturgis_pelayan?aktif=eq.true&order=urutan.asc').catch(()=>[]),
  ]);
  PENGKHOTBAH=Array.isArray(pk)?pk:[];
  PELAYAN=Array.isArray(pl)?pl:[];
}

// ── SESI ──
async function loadSesi(){
  try{
    const today=new Date().toISOString().slice(0,10);
    const list=await api(`/rest/v1/liturgis_sesi?tanggal=gte.${today}&order=tanggal.asc&limit=20`);
    SESI=Array.isArray(list)?list:[];
    CURR=SESI.length?SESI[0]:null;
    buildSessBar();
  }catch{SESI=[];CURR=null;}
}

function buildSessBar(){
  const bar=document.getElementById('sessBar');
  if(!SESI.length){bar.innerHTML='';return;}
  bar.innerHTML=SESI.map((s,i)=>`<button class="sess-btn ${i===0?'on':''}" onclick="selSess(${s.id},this)">${esc(s.label)}</button>`).join('');
  if(USER&&(USER.role==='admin'||USER.role==='ibadah'))
    bar.innerHTML+=`<button class="sess-btn" onclick="showBuatSesi()" style="border-style:dashed;color:var(--gold2)">+ Sesi</button>`;
}

async function selSess(id,el){
  document.querySelectorAll('.sess-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  CURR=SESI.find(s=>s.id===id);
  expandedIdx=-1;
  await loadCurrData();
  await renderTab();
}

// ── LOAD CURRENT DATA ──
async function loadCurrData(){
  if(!CURR){CURR_RD=[];CURR_LAGU=[];CURR_WARTA=[];CURR_JB=[];return;}
  const sid=CURR.id;
  const[rd,lg,wt,jb]=await Promise.all([
    api(`/rest/v1/liturgis_rundown?sesi_id=eq.${sid}&order=urutan.asc`).catch(()=>[]),
    api(`/rest/v1/liturgis_lagu?sesi_id=eq.${sid}&order=urutan.asc`).catch(()=>[]),
    api(`/rest/v1/liturgis_warta?sesi_id=eq.${sid}&order=urutan.asc`).catch(()=>[]),
    api(`/rest/v1/liturgis_jemaat_baru?sesi_id=eq.${sid}&order=added_at.asc`).catch(()=>[]),
  ]);
  CURR_RD=Array.isArray(rd)?rd:[];
  CURR_LAGU=Array.isArray(lg)?lg:[];
  CURR_WARTA=Array.isArray(wt)?wt:[];
  CURR_JB=Array.isArray(jb)?jb:[];
  updateStatusBar();
}

// ── STATUS BAR ──
function updateStatusBar(){
  const bar=document.getElementById('statusBar');
  const inner=document.getElementById('statusBarInner');
  if(!bar||!inner)return;
  const ONE_HOUR=60*60*1000;
  const now=Date.now();
  const items=[];
  // Check warta changes
  CURR_WARTA.forEach(w=>{
    if(w.added_at&&now-new Date(w.added_at).getTime()<ONE_HOUR)
      items.push(`<div class="status-item"><div class="s-dot"></div>Warta ditambah · ${esc(w.added_by||'?')} · ${fmtTime(w.added_at)}</div>`);
  });
  // Check jemaat baru
  CURR_JB.forEach(j=>{
    if(j.added_at&&now-new Date(j.added_at).getTime()<ONE_HOUR)
      items.push(`<div class="status-item"><div class="s-dot"></div>Jemaat baru · ${esc(j.prefix||'')} ${esc(j.nama)} · ${fmtTime(j.added_at)}</div>`);
  });
  // Check rundown changes
  CURR_RD.forEach(r=>{
    if(r.updated_at&&now-new Date(r.updated_at).getTime()<ONE_HOUR&&r.updated_by)
      items.push(`<div class="status-item"><div class="s-dot"></div>${esc(r.judul)} diubah · ${esc(r.updated_by)} · ${fmtTime(r.updated_at)}</div>`);
  });
  inner.innerHTML=items.slice(0,4).join('');
  bar.classList.toggle('show',items.length>0);
}

// ── NAV ──
const canEdit=()=>USER&&['admin','ibadah','pujian','koor','usher'].includes(USER.role);
const isAdmin=()=>USER?.role==='admin';
const isIbadah=()=>USER&&['admin','ibadah'].includes(USER.role);
const isPujian=()=>USER&&['admin','pujian'].includes(USER.role);
const isKoor=()=>USER&&['admin','koor'].includes(USER.role);
const isUsher=()=>USER&&['admin','usher'].includes(USER.role);

function buildNav(){
  const tabs=['rundown'];
  if(canEdit())tabs.push('edit');
  if(isAdmin())tabs.push('admin');
  const icons={
    rundown:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><polyline points="3 6 4 7 6 5"/><polyline points="3 12 4 13 6 11"/><polyline points="3 18 4 19 6 17"/></svg>`,
    edit:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
    admin:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>`,
  };
  const labels={rundown:'Rundown',edit:'Edit',admin:'Admin'};
  document.getElementById('bnav').innerHTML=tabs.map(t=>`<button class="bnav-btn ${t===TAB?'on':''}" onclick="switchTab('${t}',this)">${icons[t]}${labels[t]}</button>`).join('');
}

async function switchTab(tab,el){
  TAB=tab;expandedIdx=-1;
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('on'));
  el?.classList.add('on');
  await renderTab();
}

async function renderTab(){
  if(!CURR&&TAB!=='admin'){document.getElementById('mainContent').innerHTML=buildEmpty();return;}
  loading(true);
  try{
    const c=document.getElementById('mainContent');
    if(TAB==='rundown')c.innerHTML=buildRundown();
    else if(TAB==='edit')c.innerHTML=buildEdit();
    else if(TAB==='admin')c.innerHTML=await buildAdmin();
  }catch(e){toast('Gagal: '+e.message,'err');}
  finally{loading(false);}
}

function buildEmpty(){
  return`<div class="empty-state"><div class="es-icon">📅</div><div class="es-title">Belum ada sesi ibadah</div>
  <div class="es-desc">${USER?'Buat sesi baru dengan tombol + Sesi di atas':'Tidak ada ibadah yang akan datang'}</div>
  ${isIbadah()?`<button class="btn-save" style="margin-top:16px;max-width:200px;margin-inline:auto" onclick="showBuatSesi()">+ Buat Sesi</button>`:''}</div>`;
}

// ── RUNDOWN ──
function buildRundown(){
  if(!CURR_RD.length){
    return`<div class="card"><div class="empty-state" style="padding:24px"><div class="es-icon">📋</div>
    <div class="es-title">Rundown belum diisi</div>
    <div class="es-desc">${isIbadah()?'Buka tab Edit untuk mengisi rundown ibadah ini':'Bagian Ibadah belum mengisi rundown'}</div>
    </div></div>`;
  }
  const req=CURR_RD.filter(r=>r.tipe_data&&r.tipe_data!=='');
  const filled=req.filter(r=>getItemFilled(r));
  const pct=req.length?Math.round(filled.length/req.length*100):100;
  const barCls=pct===100?'':pct>=60?'warn':'danger';

  const progress=`<div class="progress-wrap">
    <div class="progress-label"><span>${esc(CURR.label)}</span><span>${filled.length}/${req.length} terisi</span></div>
    <div class="progress-bar-bg"><div class="progress-bar ${barCls}" style="width:${pct}%"></div></div>
    <div style="font-size:11px;margin-top:6px;font-weight:600;color:${pct===100?'var(--green)':'var(--amber)'}">
      ${pct===100?'✓ Semua data sudah terisi':'⚠ Ada data yang belum diisi'}
    </div></div>`;

  const items=CURR_RD.map((r,i)=>{
    const summary=getItemSummary(r);
    const hasData=r.tipe_data&&r.tipe_data!=='';
    const isEmpty=hasData&&!summary;
    const isExp=expandedIdx===i;
    const dot=hasData?(isEmpty?'<div class="dot-empty"></div>':'<div class="dot-ok"></div>'):'';
    const chipNew=r.tipe_data==='jemaat'&&CURR_JB.length?`<span class="chip-new">${CURR_JB.length}</span>`:'';
    const subHTML=summary?`<div class="rd-sub">${esc(summary)}</div>`:
      hasData?`<div class="rd-sub empty">⚠ Belum diisi</div>`:
      `<div class="rd-sub muted">${esc(r.petugas||'')}</div>`;
    const recentBadge=r.updated_at&&(Date.now()-new Date(r.updated_at).getTime())<3600000?
      `<div class="rd-upd-badge">Diubah ${fmtTime(r.updated_at)} · ${esc(r.updated_by||'')}</div>`:'';
    return`<div class="rd-item ${isExp?'expanded':''}" onclick="toggleExpand(${i},event)" style="${isEmpty?'border-left:3px solid var(--red)':''}">
      <div class="rd-n">${i+1}</div>
      <div class="rd-body">
        <div class="rd-name">${esc(r.judul)}</div>
        ${subHTML}${recentBadge}
      </div>
      ${dot}${chipNew}
    </div>
    <div class="rd-detail ${isExp?'show':''}">
      <div class="rd-detail-hdr">Detail</div>
      ${buildItemDetail(r)}
    </div>`;
  }).join('');

  return progress+`<div class="rd-wrap">${items}</div>`;
}

function getItemFilled(r){
  const td=r.tipe_data;
  if(td==='lagu')return CURR_LAGU.filter(l=>l.rundown_id===r.id).length>0||(r.nilai&&r.nilai.trim());
  if(td==='warta')return CURR_WARTA.length>0;
  if(td==='jemaat')return true; // optional
  if(td==='khotbah')return r.nilai&&r.nilai.trim();
  if(td==='bacaan')return r.nilai&&r.nilai.trim();
  if(td==='petugas')return r.nilai&&r.nilai.trim();
  return true;
}

function getItemSummary(r){
  const td=r.tipe_data;
  if(!td)return r.petugas||'';
  if(td==='lagu'){
    const lagu=CURR_LAGU.filter(l=>l.rundown_id===r.id);
    if(lagu.length)return lagu.map(l=>l.nama+(l.kode?' ('+l.kode+')':'')).join(' · ');
    return r.nilai||null;
  }
  if(td==='warta')return CURR_WARTA.length?CURR_WARTA.length+' warta':null;
  if(td==='jemaat')return CURR_JB.length?CURR_JB.length+' orang':null;
  if(td==='khotbah')return r.nilai||null;
  if(td==='bacaan')return r.nilai||null;
  if(td==='petugas')return r.nilai||null;
  return r.petugas||'';
}

function buildItemDetail(r){
  const td=r.tipe_data;
  const drow=(l,v)=>`<div class="rd-drow"><span class="rd-dl">${l}</span><span class="rd-dv ${v?'':'empty'}">${v?esc(v):'Belum diisi'}</span></div>`;

  if(td==='lagu'){
    const lagu=CURR_LAGU.filter(l=>l.rundown_id===r.id);
    if(!lagu.length&&!r.nilai)return drow('Lagu','');
    const rows=lagu.length?lagu.map(l=>`<div class="rd-drow"><span class="rd-dl">Lagu ${l.urutan}</span>
      <div style="text-align:right"><div class="rd-dv">${esc(l.nama)}${l.kode?` <span style="color:var(--ink3);font-weight:400">(${esc(l.kode)})</span>`:''}</div>
      ${l.added_by?`<div style="font-size:10px;color:var(--ink4);font-style:italic">${esc(l.added_by)} · ${fmtTime(l.added_at)}</div>`:''}
      </div></div>`).join(''):[drow('Nomor',r.nilai)];
    return rows.join('');
  }
  if(td==='khotbah'){
    // nilai format: "judul||pembicara"
    const parts=(r.nilai||'').split('||');
    return drow('Judul',parts[0])+drow('Pembicara',parts[1])+(r.updated_by?`<div class="rd-upd">✏ ${esc(r.updated_by)} · ${fmtTime(r.updated_at)}</div>`:'');
  }
  if(td==='bacaan')return drow('Ayat',r.nilai)+(r.updated_by?`<div class="rd-upd">✏ ${esc(r.updated_by)} · ${fmtTime(r.updated_at)}</div>`:'');
  if(td==='petugas')return drow('Petugas',r.nilai)+(r.updated_by?`<div class="rd-upd">✏ ${esc(r.updated_by)} · ${fmtTime(r.updated_at)}</div>`:'');
  if(td==='warta'){
    if(!CURR_WARTA.length)return drow('Warta','');
    return CURR_WARTA.map((w,i)=>`<div class="rd-drow">
      <span class="rd-dl">${i+1}.</span>
      <div style="text-align:left;flex:1"><div class="rd-dv" style="text-align:left;line-height:1.5">${esc(w.isi)}</div>
      ${w.added_by?`<div style="font-size:10px;color:var(--ink4);font-style:italic">${esc(w.added_by)} · ${fmtTime(w.added_at)}</div>`:''}
      </div></div>`).join('');
  }
  if(td==='jemaat'){
    if(!CURR_JB.length)return drow('Jemaat baru','');
    return CURR_JB.map(j=>`<div class="rd-drow">
      <span class="rd-dl">${esc(j.prefix)} ${esc(j.nama)}</span>
      <div style="text-align:right"><div class="rd-dv">Diajak: ${esc(j.diajak_oleh||'—')}</div>
      ${j.added_by?`<div style="font-size:10px;color:var(--ink4);font-style:italic">${esc(j.added_by)} · ${fmtTime(j.added_at)}</div>`:''}
      </div></div>`).join('');
  }
  return drow('Keterangan',r.petugas);
}

function toggleExpand(i,event){
  const item=event.currentTarget;
  const ripple=document.createElement('div');
  ripple.className='ripple';
  const rect=item.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height);
  ripple.style.cssText=`width:${size}px;height:${size}px;left:${(event.clientX||rect.left+rect.width/2)-rect.left-size/2}px;top:${(event.clientY||rect.top+rect.height/2)-rect.top-size/2}px`;
  item.appendChild(ripple);
  setTimeout(()=>ripple.remove(),400);
  expandedIdx=expandedIdx===i?-1:i;
  renderTab();
  if(expandedIdx===i)setTimeout(()=>{const els=document.querySelectorAll('.rd-item');if(els[i])els[i].scrollIntoView({behavior:'smooth',block:'nearest'});},50);
}

// ── EDIT ──
function buildEdit(){
  if(!CURR_RD.length&&isIbadah()){
    return`<div class="card"><div class="empty-state" style="padding:20px">
      <div class="es-icon">📋</div>
      <div class="es-title">Rundown kosong</div>
      <div class="es-desc">Inisialisasi rundown dari template untuk mulai mengisi data</div>
      <button class="btn-save" style="margin-top:16px" onclick="showInitRundown()">📋 Inisialisasi Rundown</button>
    </div></div>`;
  }
  let html='';
  if(isIbadah())html+=buildEditRundown();
  if(isPujian())html+=buildEditLagu();
  if(isKoor())html+=buildEditKoor();
  if(isUsher())html+=buildEditUsher();
  return html||'<div class="empty-state"><div class="es-icon">🔒</div><div class="es-title">Tidak ada akses edit</div></div>';
}

// Edit Rundown — Ibadah mengisi nilai per item + bisa edit judul
function buildEditRundown(){
  const pdtOpts=PENGKHOTBAH.map(p=>`<option value="${esc(p.nama)}">${esc(p.nama)}</option>`).join('');
  const litOpts=PELAYAN.map(p=>`<option value="${esc(p.jabatan+' '+p.nama)}">${esc(p.jabatan+' '+p.nama)}</option>`).join('');

  const items=CURR_RD.map(r=>{
    const td=r.tipe_data;
    let input='';
    if(td==='khotbah'){
      const parts=(r.nilai||'').split('||');
      input=`<div class="e-group"><label class="e-lbl">Judul Khotbah</label>
        <input class="e-inp" id="rd_judul_${r.id}" value="${esc(parts[0]||'')}" placeholder="Judul khotbah..."/></div>
        <div class="e-group"><label class="e-lbl">Pembicara</label>
        <select class="e-sel" id="rd_pem_${r.id}"><option value="">— Pilih —</option>${pdtOpts.replace(`value="${esc(parts[1]||'')}"`,`value="${esc(parts[1]||'')}" selected`)}</select></div>`;
    }else if(td==='bacaan'){
      input=`<div class="e-group"><label class="e-lbl">Ayat / Bacaan</label>
        <input class="e-inp" id="rd_val_${r.id}" value="${esc(r.nilai||'')}" placeholder="mis. Kej 45:1-4"/></div>`;
    }else if(td==='petugas'){
      if(r.judul.toLowerCase().includes('berdoa')||r.judul.toLowerCase().includes('pembuka')||r.judul.toLowerCase().includes('persembahan')){
        input=`<div class="e-group"><label class="e-lbl">Liturgis</label>
          <select class="e-sel" id="rd_val_${r.id}"><option value="">— Pilih —</option>${litOpts.replace(`value="${esc(r.nilai||'')}"`,`value="${esc(r.nilai||'')}" selected`)}</select></div>`;
      }else if(r.judul.toLowerCase().includes('persembahan')){
        input=`<div class="e-group"><label class="e-lbl">Petugas Persembahan</label>
          <input class="e-inp" id="rd_val_${r.id}" value="${esc(r.nilai||'')}" placeholder="mis. Pnt. Gustam, Joshua"/></div>`;
      }else if(r.judul.toLowerCase().includes('berkatan')||r.judul.toLowerCase().includes('pemberkatan')){
        input=`<div class="e-group"><label class="e-lbl">Pembicara</label>
          <select class="e-sel" id="rd_val_${r.id}"><option value="">— Pilih —</option>${pdtOpts.replace(`value="${esc(r.nilai||'')}"`,`value="${esc(r.nilai||'')}" selected`)}</select></div>`;
      }else{
        input=`<div class="e-group"><label class="e-lbl">Petugas</label>
          <input class="e-inp" id="rd_val_${r.id}" value="${esc(r.nilai||'')}" placeholder="Nama petugas..."/></div>`;
      }
    }else if(td==='lagu'&&!r.judul.toLowerCase().includes('pembuka')&&!r.judul.toLowerCase().includes('koor')){
      input=`<div class="e-group"><label class="e-lbl">Nomor / Nama Lagu</label>
        <input class="e-inp" id="rd_val_${r.id}" value="${esc(r.nilai||'')}" placeholder="mis. 56 - S'lama Seminggu Lalu"/></div>`;
    }else if(td===''){
      input=''; // no input needed
    }

    if(!input&&td!=='lagu'&&td!=='warta'&&td!=='jemaat')return'';

    return`<div class="item-card">
      <div class="item-card-hd">
        <div class="item-card-ttl">${esc(r.judul)}</div>
        ${isAdmin()?`<button class="btn-remove" onclick="editItemJudul(${r.id},'${esc(r.judul)}','${esc(r.petugas||'')}')">✏</button>`:''}
      </div>
      ${input}
      ${td&&td!==''?`<button onclick="saveRundownItem(${r.id},'${td}')" style="padding:10px 16px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);width:100%">💾 Simpan</button>`:''}
    </div>`;
  }).filter(Boolean).join('');

  return`<div class="edit-section">
    <div class="edit-section-hd" onclick="toggleSection(this)">
      <div class="edit-section-ttl">📋 Data Ibadah</div>
      <span style="color:var(--ink4);font-size:12px">▼</span>
    </div>
    <div class="edit-section-body open">
      ${items||'<div style="text-align:center;padding:16px;color:var(--ink3);font-size:13px">Tidak ada item yang perlu diisi</div>'}
      ${isAdmin()||isIbadah()?`<button class="btn-add-sm" onclick="showTambahItem()">+ Tambah Item Rundown</button>`:''}
    </div>
  </div>`;
}

// Edit Lagu — Pujian (lagu pembuka satu per satu)
function buildEditLagu(){
  const rdPembuka=CURR_RD.find(r=>r.tipe_data==='lagu'&&r.judul.toLowerCase().includes('pembuka'));
  const laguList=rdPembuka?CURR_LAGU.filter(l=>l.rundown_id===rdPembuka.id):[];

    <div class="item-card-hd">
      <div class="item-card-ttl">Lagu ${l.urutan}</div>

        <div class="item-card-meta">${esc(l.added_by||'')} · ${fmtTime(l.added_at)}</div>
        <button class="btn-remove" onclick="hapusLagu(${l.id})">×</button>
      </div>
    </div>
    <div style="font-size:13px;font-weight:600">${esc(l.nama)}</div>
    ${l.kode?`<div style="font-size:12px;color:var(--ink3);margin-top:2px">${esc(l.kode)}</div>`:''}
  </div>`).join('');

  return`<div class="edit-section">
    <div class="edit-section-hd" onclick="toggleSection(this)">
      <div class="edit-section-ttl">🎵 Pujian Pembuka</div>
      <span style="color:var(--ink4);font-size:12px">▼</span>
    </div>
    <div class="edit-section-body open">
      ${laguHTML||'<div style="text-align:center;padding:12px;color:var(--ink3);font-size:13px">Belum ada lagu</div>'}
      <button class="btn-add-sm" onclick="showTambahLagu(${rdPembuka?.id||'null'})">+ Tambah Lagu</button>

function toggleSection(hd){
  const body=hd.nextElementSibling;
  const arrow=hd.querySelector('span');
  body.classList.toggle('open');
  arrow.textContent=body.classList.contains('open')?'▼':'▶';
}

// ── MODAL HELPERS ──
function showModal(ttl, bodyHTML, onClose){
  const m=document.createElement('div');
  m.className='modal-overlay';
  m.id='mainModal';
  m.innerHTML=`<div class="modal-sheet">
    <div class="modal-hd">
      <div class="modal-ttl">${ttl}</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    ${bodyHTML}
    <div style="height:20px"></div>
  </div>`;
  m.addEventListener('click',e=>{if(e.target===m)closeModal();});
  document.body.appendChild(m);
}
function closeModal(){document.getElementById('mainModal')?.remove();}

// ── INISIALISASI RUNDOWN DARI TEMPLATE ──
function showInitRundown(){
  const tipeLabel={minggu1:'Minggu kb-1',minggu2:'Minggu kb-2',rabu:'Rabu Malam'};
  showModal('Inisialisasi Rundown',`
    <div style="font-size:13px;color:var(--ink3);margin-bottom:16px;line-height:1.5">
      Pilih template untuk mengisi rundown ibadah <strong>${esc(CURR.label)}</strong>
    </div>
    <div class="e-group"><label class="e-lbl">Template</label>
      <select class="e-sel" id="mInitTipe">
        <option value="minggu1">Minggu kb-1 (Pagi)</option>
        <option value="minggu2">Minggu kb-2 (Siang)</option>
        <option value="rabu">Rabu Malam</option>
      </select>
    </div>
    <button class="btn-save" onclick="initRundown()">📋 Inisialisasi dari Template</button>`);
  // Pre-select based on current sesi tipe
  setTimeout(()=>{const sel=document.getElementById('mInitTipe');if(sel&&CURR.tipe)sel.value=CURR.tipe;},50);
}

async function initRundown(){
  const tipe=document.getElementById('mInitTipe')?.value;
  if(!tipe)return;
  if(!confirm('Inisialisasi rundown? Data yang sudah ada akan dihapus.'))return;
  closeModal();
  loading(true,'Membuat rundown...');
  try{
    // Load template items
    const tmpl=await api(`/rest/v1/liturgis_template?tipe=eq.${tipe}&select=id,nama`);
    if(!tmpl.length)throw new Error('Template tidak ditemukan');
    const tmplId=tmpl[0].id;
    const items=await api(`/rest/v1/liturgis_template_item?template_id=eq.${tmplId}&order=urutan.asc`);
    // Delete existing rundown
    await fetch(`${SB}/rest/v1/liturgis_rundown?sesi_id=eq.${CURR.id}`,{method:'DELETE',headers:H()});
    // Insert new rundown items
    const rows=items.map(item=>({
      sesi_id:CURR.id,
      urutan:item.urutan,
      judul:item.judul,
      petugas:item.petugas||'',
      tipe_data:item.tipe_data||'',
      nilai:'',
      updated_by:USER.nama,
      updated_at:new Date().toISOString(),
    }));
    await fetch(`${SB}/rest/v1/liturgis_rundown`,{method:'POST',headers:{...H(),'Prefer':'return=minimal'},body:JSON.stringify(rows)});
    await loadCurrData();toast('Rundown berhasil diinisialisasi ✓','ok');
    TAB='edit';buildNav();await renderTab();
  }catch(e){toast('Gagal: '+e.message,'err');}finally{loading(false);}
}

      </select>

async function createSesi(){
  const date=document.getElementById('mDate')?.value;
  const tipe=document.getElementById('mTipe')?.value;
  if(!date){toast('Pilih tanggal','err');return;}
  const dt=new Date(date+'T00:00:00');
  const d=dt.getDate(),m=dt.toLocaleString('id-ID',{month:'short'});
  const labels={minggu1:`Minggu kb-1 · ${d} ${m}`,minggu2:`Minggu kb-2 · ${d} ${m}`,rabu:`Rabu · ${d} ${m}`};
  closeModal();
  loading(true,'Membuat sesi...');
  try{
    await fetch(`${SB}/rest/v1/liturgis_sesi`,{method:'POST',headers:{...H(),'Prefer':'return=minimal'},
      body:JSON.stringify({label:labels[tipe],tipe,tanggal:date,created_by:USER.nama,created_at:new Date().toISOString()})});
    toast('Sesi baru dibuat ✓','ok');
    await loadSesi();
    // Auto select new sesi
    CURR=SESI.find(s=>s.tanggal===date&&s.tipe===tipe)||SESI[SESI.length-1];
    buildSessBar();
    await loadCurrData();
    TAB='edit';buildNav();await renderTab();
  }catch(e){toast('Gagal: '+e.message,'err');}finally{loading(false);}
}

  if(!nama){toast('Isi nama dulu','err');return;}
  try{
    await fetch(`${SB}/rest/v1/liturgis_pelayan`,{method:'POST',headers:{...H(),'Prefer':'return=minimal'},body:JSON.stringify({nama,jabatan:jab,aktif:true,urutan:99})});
    await loadMaster();refreshDropdowns();document.getElementById('eNewLav').value='';
    toast('Pelayan ditambahkan ✓','ok');await renderTab();
  }catch(e){toast('Gagal: '+e.message,'err');}
}

function refreshDropdowns(){
  const pdtOpts='<option value="">— Pilih —</option>'+PENGKHOTBAH.map(p=>`<option value="${esc(p.nama)}">${esc(p.nama)}</option>`).join('');
  const litOpts='<option value="">— Pilih —</option>'+PELAYAN.map(p=>{const v=p.jabatan+' '+p.nama;return`<option value="${esc(v)}">${esc(v)}</option>`;}).join('');
  document.querySelectorAll('select[id^="rd_pem_"]').forEach(s=>{const cur=s.value;s.innerHTML=pdtOpts;s.value=cur;});
  document.querySelectorAll('select[id^="rd_val_"]').forEach(s=>{const cur=s.value;s.innerHTML=litOpts;s.value=cur;});
}

init();
</script>
</body>
